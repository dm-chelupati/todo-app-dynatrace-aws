name: Deploy Todo App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Build Lambda Dependencies
      run: |
        cd app/lambda
        mkdir -p python
        pip install -r requirements.txt -t python/
        mkdir -p ../../terraform
        zip -r ../../terraform/lambda_layer.zip python/
        rm -rf python
    
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: 1.5.0
    
    - name: Terraform Init
      working-directory: ./terraform
      run: terraform init
    
    - name: Terraform Plan
      working-directory: ./terraform
      run: terraform plan
      env:
        TF_VAR_dynatrace_url: ${{ secrets.DYNATRACE_URL }}
        TF_VAR_dynatrace_token: ${{ secrets.DYNATRACE_TOKEN }}
        TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}
    
    - name: Terraform Apply
      working-directory: ./terraform
      run: terraform apply -auto-approve
      env:
        TF_VAR_dynatrace_url: ${{ secrets.DYNATRACE_URL }}
        TF_VAR_dynatrace_token: ${{ secrets.DYNATRACE_TOKEN }}
        TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}
    
    - name: Get API Endpoint
      id: api_endpoint
      working-directory: ./terraform
      run: echo "url=$(terraform output -raw api_endpoint)" >> $GITHUB_OUTPUT
    
    - name: Update Frontend with API URL
      run: |
        sed -i "s|API_GATEWAY_URL_PLACEHOLDER|${{ steps.api_endpoint.outputs.url }}|g" frontend/index.html
    
    - name: Deploy Frontend to S3
      run: |
        BUCKET_NAME=$(cd terraform && terraform output -raw s3_website_url | cut -d'.' -f1)
        aws s3 cp frontend/index.html s3://${BUCKET_NAME}/index.html
